# ============================================================================
#  CONTENT — Cấu hình chung (hard logic dùng cho mọi kênh)
# ============================================================================

# Topic active của MÁY này (mỗi máy chạy 1 topic, Sheet + creds riêng).
# Đổi giá trị này khi copy tool sang máy topic khác (vd: tai-chinh, thu-cung...).
active_topic: tam-ly

# Bảng ngôn ngữ: số thứ tự T1..T10 (trong mã kênh TLx-Ty) → mã ngôn ngữ
languages:
  T1: es        # Tây Ban Nha
  T2: vi        # Việt
  T3: en        # Anh
  T4: fr        # Pháp
  T5: de        # Đức
  T6: pt        # Bồ Đào Nha
  T7: ja        # Nhật
  T8: ko        # Hàn
  T9: it        # Ý
  T10: tr       # Thổ Nhĩ Kỳ

# Số ký tự voiceover mục tiêu mỗi phút, chỉnh sau khi đo thực tế từng giọng đọc.
duration_char_rates:
  es: 1050
  vi: 950
  en: 1000
  fr: 1050
  de: 950
  pt: 1050
  ja: 430
  ko: 520
  it: 1050
  tr: 1000

duration_tolerance_pct: 15

# ── Model dùng cho từng bước ────────────────────────────────────────────────
models:
  analyze: claude-sonnet-4-6
  write:   claude-sonnet-4-6
  check:   claude-sonnet-4-6

# ── Luồng viết từng khúc ────────────────────────────────────────────────────
pipeline:
  max_parts: 12             # trần số khúc (đối thủ quyết số thực)
  pass_score: 8             # điểm tối thiểu để chốt 1 khúc
  max_rewrites_per_part: 2  # số lần viết lại tối đa cho 1 khúc
  context_chars_per_part: 4000

# ── Format đầu ra cho ElevenLabs ────────────────────────────────────────────
output:
  blank_line_between_paragraphs: true
  voice_dir: C:\Users\Administrator\Desktop\voice\voice

# ── Google Sheet ────────────────────────────────────────────────────────────
sheet:
  spreadsheet_name: KA
  input_sheet: INPUT
  nguon_sheet: NGUON
  columns:
    ma: 0
    link: 1
    title: 19
    thumb: 20
    channel: 34
    seo: 35
    content: 36
    content2: 37
    content3: 38
  nguon_columns:
    ma: 6
    link: 1
    title: 2
    thumb: 3
    hook: 4
